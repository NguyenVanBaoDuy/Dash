<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Công Ty TNHH BD MMO</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .dashboard-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
      }
      .table-dark {
        background: rgba(0, 0, 0, 0.3);
      }
      .btn-custom {
        border-radius: 10px;
        font-weight: 500;
      }
      .money-display {
        font-size: 2.5rem;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }
      @media (max-width: 768px) {
        .money-display {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-fluid py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-11">
          <!-- Header -->
          <div class="dashboard-card p-4 mb-5">
            <div class="text-center mb-4">
              <h1 class="text-white display-4 fw-bold mb-2">
                Công Ty TNHH BD MMO
              </h1>
              <p class="text-white-50 lead">
                Hệ thống quản lý nhân viên &amp; tài chính
              </p>
            </div>

            <!-- Money Section -->
            <div class="row text-center mb-5">
              <div class="col-12">
                <div class="money-display text-warning mb-3" id="totalMoney">
                  0 VNĐ
                </div>
                <div class="d-flex justify-content-center gap-2 flex-wrap">
                  <button
                    class="btn btn-success btn-lg btn-custom px-4"
                    onclick="addMoney()"
                  >
                    <i class="bi bi-plus-circle me-2"></i>Thêm tiền
                  </button>
                  <button
                    class="btn btn-danger btn-lg btn-custom px-4"
                    onclick="subtractMoney()"
                  >
                    <i class="bi bi-dash-circle me-2"></i>Trừ tiền
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Add Employee Section -->
          <div class="dashboard-card p-4 mb-4">
            <h3 class="text-white mb-4">
              <i class="bi bi-person-plus me-2"></i>Thêm nhân viên mới
            </h3>
            <div class="row g-3">
              <div class="col-md-4">
                <input
                  type="text"
                  class="form-control"
                  id="empName"
                  placeholder="Tên nhân viên"
                />
              </div>
              <div class="col-md-4">
                <input
                  type="tel"
                  class="form-control"
                  id="empPhone"
                  placeholder="Số điện thoại"
                />
              </div>
              <div class="col-md-3">
                <input
                  type="text"
                  class="form-control"
                  id="empRole"
                  placeholder="Chức vụ"
                />
              </div>
              <div class="col-md-1">
                <button
                  class="btn btn-primary w-100 h-100 btn-custom"
                  onclick="addEmployee()"
                >
                  <i class="bi bi-plus-lg"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Search & Table Section -->
          <div class="dashboard-card p-4">
            <div
              class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2"
            >
              <h3 class="text-white mb-0">
                <i class="bi bi-people me-2"></i>Danh sách nhân viên
              </h3>
              <input
                type="text"
                class="form-control form-control-lg"
                id="searchInput"
                placeholder="Tìm kiếm theo tên..."
                style="max-width: 300px"
              />
            </div>

            <div class="table-responsive">
              <table class="table table-dark table-hover">
                <thead>
                  <tr>
                    <th>STT</th>
                    <th>Tên</th>
                    <th>Số ĐT</th>
                    <th>Chức vụ</th>
                    <th>Tiền</th>
                    <th>Thao tác</th>
                  </tr>
                </thead>
                <tbody id="employeeTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let employees = JSON.parse(localStorage.getItem("employees")) || [];
      let totalMoney = parseInt(localStorage.getItem("totalMoney")) || 0;

      function updateMoneyDisplay() {
        document.getElementById("totalMoney").textContent =
          totalMoney.toLocaleString() + " VNĐ";
        localStorage.setItem("totalMoney", totalMoney);
      }

      function addMoney() {
        const amount = parseInt(prompt("Nhập số tiền cần thêm:"));
        if (!isNaN(amount) && amount > 0) {
          totalMoney += amount;
          updateMoneyDisplay();
        }
      }

      function subtractMoney() {
        const amount = parseInt(prompt("Nhập số tiền cần trừ:"));
        if (!isNaN(amount) && amount > 0 && amount <= totalMoney) {
          totalMoney -= amount;
          updateMoneyDisplay();
        } else if (amount > totalMoney) {
          alert("Số tiền trừ không được vượt quá tổng tiền hiện tại!");
        }
      }

      function addEmployee() {
        const name = document.getElementById("empName").value.trim();
        const phone = document.getElementById("empPhone").value.trim();
        const role = document.getElementById("empRole").value.trim();

        if (name && phone && role) {
          employees.push({ name, phone, role });
          localStorage.setItem("employees", JSON.stringify(employees));
          document.getElementById("empName").value = "";
          document.getElementById("empPhone").value = "";
          document.getElementById("empRole").value = "";
          renderTable();
        } else {
          alert("Vui lòng điền đầy đủ thông tin!");
        }
      }

      function deleteEmployee(index) {
        if (confirm("Bạn có chắc muốn xóa nhân viên này?")) {
          employees.splice(index, 1);
          localStorage.setItem("employees", JSON.stringify(employees));
          renderTable();
        }
      }

      function renderTable() {
        const tbody = document.getElementById("employeeTableBody");
        tbody.innerHTML = "";

        employees.forEach((emp, index) => {
          const row = tbody.insertRow();
          row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${emp.name}</td>
                    <td>${emp.phone}</td>
                    <td>${emp.role}</td>
                    <td>${totalMoney.toLocaleString()} VNĐ</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                `;
        });
      }

      function searchEmployees() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const tbody = document.getElementById("employeeTableBody");
        tbody.innerHTML = "";

        const filtered = employees.filter((emp) =>
          emp.name.toLowerCase().includes(query),
        );

        filtered.forEach((emp, displayIndex) => {
          const originalIndex = employees.findIndex(
            (e) =>
              e.name === emp.name &&
              e.phone === emp.phone &&
              e.role === emp.role,
          );
          const row = tbody.insertRow();
          row.innerHTML = `
                    <td>${displayIndex + 1}</td>
                    <td>${emp.name}</td>
                    <td>${emp.phone}</td>
                    <td>${emp.role}</td>
                    <td>${totalMoney.toLocaleString()} VNĐ</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${originalIndex})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                `;
        });
      }

      // Initialize
      updateMoneyDisplay();
      renderTable();
      document
        .getElementById("searchInput")
        .addEventListener("input", searchEmployees);

      // Allow Enter to add employee
      document.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          const active = document.activeElement;
          if (
            active.id === "empName" ||
            active.id === "empPhone" ||
            active.id === "empRole"
          ) {
            addEmployee();
          }
        }
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đếm Ngược Tết 2027</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(
          135deg,
          #ff6b35 0%,
          #f7931e 50%,
          #ffd23f 100%
        );
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* Tet decorations */
      .mai-flower,
      .dao-flower {
        position: absolute;
        font-size: 2rem;
        animation: float 6s ease-in-out infinite;
        opacity: 0.7;
      }

      .mai-flower {
        color: #ffd700;
      }
      .dao-flower {
        color: #ff69b4;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      /* Fireworks */
      .firework {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #ffd700;
        border-radius: 50%;
        animation: explode 2s ease-out infinite;
      }

      @keyframes explode {
        0% {
          transform: scale(0);
          opacity: 1;
        }
        100% {
          transform: scale(20);
          opacity: 0;
        }
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      h1 {
        color: #8b0000;
        font-size: 2.5rem;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        animation: glow 2s ease-in-out infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow:
            2px 2px 4px rgba(0, 0, 0, 0.3),
            0 0 10px #ffd700;
        }
        to {
          text-shadow:
            2px 2px 4px rgba(0, 0, 0, 0.3),
            0 0 20px #ff4500;
        }
      }

      #countdown {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 30px;
        margin: 30px 0;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .countdown-item {
        display: inline-block;
        margin: 0 15px;
        background: linear-gradient(45deg, #ff6b35, #ffd23f);
        color: white;
        padding: 20px;
        border-radius: 15px;
        min-width: 80px;
        font-weight: bold;
        font-size: 1.2rem;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .label {
        font-size: 0.8rem;
        margin-top: 5px;
      }

      /* Journal section */
      #journal {
        background: rgba(139, 0, 0, 0.9);
        color: white;
        border-radius: 20px;
        padding: 30px;
        margin-top: 30px;
      }

      #journal h2 {
        margin-bottom: 20px;
        font-size: 1.8rem;
      }

      #journal textarea {
        width: 100%;
        min-height: 120px;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        resize: vertical;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.95);
      }

      #saveBtn,
      #viewBtn {
        background: #ffd700;
        color: #8b0000;
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        margin: 5px;
        transition: all 0.3s;
      }

      #saveBtn:hover,
      #viewBtn:hover {
        background: #ffed4e;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      #entries {
        margin-top: 20px;
        text-align: left;
      }

      .entry {
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 10px;
        border-left: 5px solid #ffd700;
      }

      .entry-date {
        font-weight: bold;
        color: #8b0000;
        margin-bottom: 5px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }
        .countdown-item {
          margin: 5px;
          padding: 15px 10px;
          font-size: 1rem;
        }
        .container {
          padding: 10px;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.5rem;
        }
        .countdown-item {
          min-width: 60px;
          padding: 10px 5px;
        }
      }

      /* Banh chung */
      .banh-chung {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        background: #228b22;
        border-radius: 50% 50% 10% 10%;
        animation: bounce 3s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }
    </style>
  </head>
  <body>
    <!-- Decorations -->
    <div class="mai-flower" style="top: 10%; left: 10%; animation-delay: 0s">
      🌸
    </div>
    <div class="dao-flower" style="top: 20%; right: 10%; animation-delay: 2s">
      🌺
    </div>
    <div class="mai-flower" style="top: 60%; left: 20%; animation-delay: 1s">
      🌸
    </div>
    <div class="dao-flower" style="top: 70%; right: 20%; animation-delay: 3s">
      🌺
    </div>
    <div class="banh-chung"></div>

    <div class="container">
      <h1>🎉 ĐẾM NGƯỢC TẾT 2027 🎉</h1>

      <div id="countdown">
        <div class="countdown-item">
          <div id="days">00</div>
          <div class="label">Ngày</div>
        </div>
        <div class="countdown-item">
          <div id="hours">00</div>
          <div class="label">Giờ</div>
        </div>
        <div class="countdown-item">
          <div id="minutes">00</div>
          <div class="label">Phút</div>
        </div>
        <div class="countdown-item">
          <div id="seconds">00</div>
          <div class="label">Giây</div>
        </div>
      </div>

      <div id="journal">
        <h2>📖 Nhật Ký Mỗi Ngày</h2>
        <textarea
          id="journalEntry"
          placeholder="Hôm nay bạn đã làm gì để chuẩn bị Tết? Chia sẻ nhật ký của bạn..."
        ></textarea>
        <br />
        <button id="saveBtn">💾 Lưu Nhật Ký</button>
        <button id="viewBtn">📋 Xem Nhật Ký</button>
        <div id="entries"></div>
        <div
          style="
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
          "
        >
          By BaoDuyDev
        </div>
      </div>
    </div>

    <script>
      // Countdown to Tet 2027 (01/01/2027 00:00:00 Vietnam time)
      const tetDate = new Date("2027-01-01T00:00:00+07:00");

      function updateCountdown() {
        const now = new Date();
        const diff = tetDate - now;

        if (diff > 0) {
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor(
            (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
          );
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);

          document.getElementById("days").textContent = days
            .toString()
            .padStart(2, "0");
          document.getElementById("hours").textContent = hours
            .toString()
            .padStart(2, "0");
          document.getElementById("minutes").textContent = minutes
            .toString()
            .padStart(2, "0");
          document.getElementById("seconds").textContent = seconds
            .toString()
            .padStart(2, "0");
        } else {
          document.getElementById("countdown").innerHTML =
            '<h2 style="color:#8b0000;">🎊 TẾT ĐÃ ĐẾN! CHÚC MỪNG NĂM MỚI! 🎊</h2>';
        }
      }

      // Fireworks effect
      function createFirework() {
        const firework = document.createElement("div");
        firework.className = "firework";
        firework.style.left = Math.random() * 100 + "%";
        firework.style.top = Math.random() * 100 + "%";
        document.body.appendChild(firework);
        setTimeout(() => firework.remove(), 2000);
      }

      // Journal functionality
      const journalEntry = document.getElementById("journalEntry");
      const saveBtn = document.getElementById("saveBtn");
      const viewBtn = document.getElementById("viewBtn");
      const entriesDiv = document.getElementById("entries");

      function getTodayKey() {
        return new Date().toISOString().split("T")[0]; // YYYY-MM-DD
      }

      function saveJournal() {
        const text = journalEntry.value.trim();
        if (!text) return;

        const key = getTodayKey();
        const journals = JSON.parse(
          localStorage.getItem("tetJournals") || "{}",
        );
        journals[key] = text;
        localStorage.setItem("tetJournals", JSON.stringify(journals));
        alert("✅ Đã lưu nhật ký hôm nay!");
        journalEntry.value = "";
      }

      function viewJournals() {
        const journals = JSON.parse(
          localStorage.getItem("tetJournals") || "{}",
        );
        entriesDiv.innerHTML = "";

        if (Object.keys(journals).length === 0) {
          entriesDiv.innerHTML =
            '<p style="text-align:center;color:#ffd700;">Chưa có nhật ký nào được lưu.</p>';
          return;
        }

        Object.entries(journals)
          .sort(([a], [b]) => new Date(b) - new Date(a)) // Newest first
          .forEach(([date, content]) => {
            const entry = document.createElement("div");
            entry.className = "entry";
            entry.innerHTML = `
                        <div class="entry-date">${date}</div>
                        <p>${content}</p>
                    `;
            entriesDiv.appendChild(entry);
          });
      }

      // Event listeners
      saveBtn.addEventListener("click", saveJournal);
      viewBtn.addEventListener("click", viewJournals);

      journalEntry.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && e.ctrlKey) saveJournal();
      });

      // Init
      setInterval(updateCountdown, 1000);
      updateCountdown();

      // Fireworks every 3 seconds
      setInterval(createFirework, 3000);

      // Load today's entry on start
      const todayKey = getTodayKey();
      const saved = localStorage.getItem("tetJournals");
      if (saved) {
        const journals = JSON.parse(saved);
        if (journals[todayKey]) {
          journalEntry.value = journals[todayKey];
        }
      }
    </script>
  </body>
</html>
